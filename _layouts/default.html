<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav aria-label="Legal pages">
        <a href="{{ site.data.legal.privacy_policy_path | relative_url }}">Privacy</a>
        <a href="{{ site.data.legal.terms_path | relative_url }}">Terms</a>
        <a href="{{ site.data.legal.eula_path | relative_url }}">EULA</a>
        <a href="{{ site.data.legal.cookie_policy_path | relative_url }}">Cookies</a>
        <a href="{{ site.data.legal.contact_path | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap legal-content">
    {% if page.show_updated %}
    <p class="last-updated"><strong>Last updated:</strong> {{ site.data.legal.effective_date }}</p>
    {% endif %}
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>{{ site.data.legal.entity_name }} · <a href="mailto:{{ site.data.legal.contact_email }}">{{ site.data.legal.contact_email }}</a></p>
      <p class="fine-print">Draft policies for Dot Clash. Not legal advice.</p>
    </div>
  </footer>
</body>
</html>
