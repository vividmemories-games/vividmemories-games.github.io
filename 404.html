<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join Dot Clash Challenge</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0e1e35;
      color: #f4f7ff;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      border: 1px solid rgba(255, 196, 77, 0.35);
      border-radius: 20px;
      padding: 28px 24px;
      background: rgba(255, 255, 255, 0.04);
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    p { color: #b8c4dc; line-height: 1.5; }
    .code {
      font-size: 2rem;
      letter-spacing: 0.35em;
      font-weight: 800;
      color: #ffc44d;
      margin: 20px 0;
    }
    a.btn {
      display: inline-block;
      margin: 8px 6px 0;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: #ffc44d;
      color: #0e1e35;
    }
    a.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #f4f7ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dot Clash Challenge</h1>
    <p id="subtitle">Remember this game from class? Open the app to accept.</p>
    <div class="code" id="code">------</div>
    <p id="hint">Install Dot Clash to play your friend.</p>
    <a class="btn" id="openApp" href="#">Open in app</a>
    <a class="btn secondary" href="https://apps.apple.com/app/id0000000000">App Store</a>
    <a class="btn secondary" href="https://play.google.com/store/apps/details?id=com.vividmemories.dotclash">Google Play</a>
  </div>
  <script>
    const match = location.pathname.match(/\/join\/([A-Z0-9]{6})\/?$/i);
    const code = match ? match[1].toUpperCase() : null;
    const codeEl = document.getElementById('code');
    const openApp = document.getElementById('openApp');
    if (code) {
      codeEl.textContent = code;
      openApp.href = 'dotclash://join/' + code;
      document.getElementById('subtitle').textContent = 'Your friend challenged you!';
    } else {
      codeEl.textContent = '??????';
      openApp.style.display = 'none';
      document.getElementById('hint').textContent = 'Ask your friend for a 6-character code in the app.';
    }
  </script>
</body>
</html>
