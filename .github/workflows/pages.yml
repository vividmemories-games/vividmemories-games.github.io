name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630cea9d9a406fb2174f9dfc9 # v4.2.2

      - name: Setup Ruby and build
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-bundler ruby-dev build-essential
          bundle install --jobs 4 --retry 3
          bundle exec jekyll build --destination _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e742ecce949b7cd334633ee99470446c # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac9416a25249ec6cadfaf92f231b9d69 # v4.0.5
